services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h # Keep models in VRAM/RAM longer to avoid reloading delays
      - OLLAMA_ORIGINS=* # Required for cross-origin API requests
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # Allow Ollama to utilize all available GPUs
              capabilities: [gpu]

  # Sidecar container to automatically pull models on first startup
  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama-puller
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        sleep 5;
        # Define the model list here for easy maintenance
        MODELS="
        llama3.1
        llama3.1:70b
        qwen2.5-coder:14b-instruct
        qwen2.5:32b
        gemma2:27b
        command-r
        deepseek-r1:32b
        deepseek-coder-v2:16b-lite-instruct-q8_0
        "
        
        echo "Starting to pull models..."
        for model in $$MODELS; do
          echo "Checking/Pulling $$model..."
          curl -X POST http://ollama:11434/api/pull -d "{\"name\": \"$$model\"}"
        done
        echo "All models handled!"

volumes:
  ollama_data:
    driver: local